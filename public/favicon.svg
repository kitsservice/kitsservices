<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>KITS Service &amp; Maintenance</title>

  <!-- White rounded background -->
  <rect width="64" height="64" rx="12" fill="white"/>

  <!-- Dark navy gear ring -->
  <circle cx="28" cy="28" r="23" fill="#1a2a5e"/>
  <!-- Gear inner hole -->
  <circle cx="28" cy="28" r="14" fill="white"/>

  <!-- Gear teeth — 8 teeth evenly spread -->
  <rect x="24.5" y="2" width="7" height="9" rx="2.5" fill="#1a2a5e"/>
  <rect x="24.5" y="2" width="7" height="9" rx="2.5" fill="#1a2a5e" transform="rotate(45 28 28)"/>
  <rect x="24.5" y="2" width="7" height="9" rx="2.5" fill="#1a2a5e" transform="rotate(90 28 28)"/>
  <rect x="24.5" y="2" width="7" height="9" rx="2.5" fill="#1a2a5e" transform="rotate(135 28 28)"/>
  <rect x="24.5" y="2" width="7" height="9" rx="2.5" fill="#1a2a5e" transform="rotate(180 28 28)"/>
  <rect x="24.5" y="2" width="7" height="9" rx="2.5" fill="#1a2a5e" transform="rotate(225 28 28)"/>
  <rect x="24.5" y="2" width="7" height="9" rx="2.5" fill="#1a2a5e" transform="rotate(270 28 28)"/>
  <rect x="24.5" y="2" width="7" height="9" rx="2.5" fill="#1a2a5e" transform="rotate(315 28 28)"/>

  <!-- Orange swoosh arc (signature element from logo) -->
  <path d="M 14,16 Q 16,28 20,40" stroke="#e85d04" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- K letter centred in hole -->
  <text x="21" y="37" font-family="'Arial Black', Impact, sans-serif" font-size="19" font-weight="900" fill="#1a2a5e">K</text>

  <!-- KITS text at bottom right of the icon -->
  <rect x="43" y="44" width="19" height="18" rx="4" fill="#e85d04"/>
  <text x="52.5" y="57" font-family="'Arial Black', sans-serif" font-size="9" font-weight="900" fill="white" text-anchor="middle" letter-spacing="0.5">KSM</text>
</svg>
